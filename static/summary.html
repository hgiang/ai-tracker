<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Summary — AI Tracker</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body { background: var(--bg-primary); min-height: 100vh; }

    .page-shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }
    .site-logo {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent-text);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .site-logo:hover { text-decoration: underline; }
    .type-pill {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent-text);
    }

    /* ── Provider form card ── */
    .provider-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
    }
    .provider-card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 1.25rem;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 520px) {
      .form-row { grid-template-columns: 1fr; }
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .form-group label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }
    .form-group select,
    .form-group input {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition);
    }
    .form-group select:focus,
    .form-group input:focus {
      border-color: var(--accent);
    }
    .provider-hint {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-bottom: 1rem;
    }
    .provider-hint a { color: var(--accent-text); }

    /* ── Summary card ── */
    .summary-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: none;
    }
    .summary-card.visible { display: block; }
    .card-top {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border-light);
      display: none;
    }
    .card-top.visible { display: block; }
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-tertiary);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      margin-bottom: 1rem;
    }
    .ai-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .paper-title {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text-primary);
      margin: 0;
    }
    .card-body {
      padding: 1.75rem 2rem;
    }

    /* ── Loading ── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 3rem 2rem;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }
    .loading-dots {
      display: flex;
      gap: 6px;
    }
    .loading-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── Summary body ── */
    .summary-body {
      font-size: 1rem;
      line-height: 1.85;
      color: var(--text-secondary);
    }
    .summary-body p { margin: 0 0 1.1rem; }
    .summary-body p:last-child { margin-bottom: 0; }

    /* ── Error ── */
    .error-state {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1.25rem 1.5rem;
      background: var(--danger-light);
      border: 1px solid #fca5a5;
      border-radius: var(--radius-md);
      color: var(--danger);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <a class="site-logo" href="/">AI Tracker</a>
      <span class="type-pill">Paper Summary</span>
    </header>

    <!-- Provider configuration form -->
    <div class="provider-card" id="provider-card">
      <h2>Configure AI Provider</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="provider-select">Provider</label>
          <select id="provider-select">
            <option value="openai">OpenAI (GPT-4o)</option>
            <option value="anthropic">Anthropic (Claude Sonnet)</option>
            <option value="gemini">Google Gemini (2.0 Flash)</option>
            <option value="grok">Grok (Grok-3 Mini)</option>
            <option value="kimi">Kimi (K2.6)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="api-key-input">API Key</label>
          <input
            type="password"
            id="api-key-input"
            placeholder="Enter your API key…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>
      <p class="provider-hint" id="provider-hint"></p>
      <button class="btn btn-primary" id="btn-generate">Generate Summary</button>
    </div>

    <!-- Summary result card (hidden until generation starts) -->
    <div class="summary-card" id="summary-card">
      <div id="card-top" class="card-top">
        <div class="ai-badge"><span class="ai-dot"></span><span id="provider-label">AI</span></div>
        <h1 class="paper-title" id="paper-title"></h1>
      </div>
      <div class="card-body" id="card-body">
        <div class="loading-state" id="loading">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
          <span id="loading-text">Generating summary…</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { renderMarkdown } from '/static/js/components.js';

    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);

    const PROVIDER_HINTS = {
      openai:    'Get your key at <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a>',
      anthropic: 'Get your key at <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>',
      gemini:    'Get your key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a>',
      grok:      'Get your key at <a href="https://console.x.ai" target="_blank">console.x.ai</a>',
      kimi:      'Get your key at <a href="https://platform.moonshot.cn" target="_blank">platform.moonshot.cn</a>',
    };
    const PROVIDER_LABELS = {
      openai: 'GPT-4o', anthropic: 'Claude Sonnet', gemini: 'Gemini 2.0 Flash',
      grok: 'Grok-3 Mini', kimi: 'Kimi K2.6',
    };

    const params = new URLSearchParams(location.search);
    const itemId = params.get('item_id');

    const providerSelect = document.getElementById('provider-select');
    const apiKeyInput    = document.getElementById('api-key-input');
    const providerHint   = document.getElementById('provider-hint');
    const btnGenerate    = document.getElementById('btn-generate');
    const summaryCard    = document.getElementById('summary-card');
    const cardTop        = document.getElementById('card-top');
    const cardBody       = document.getElementById('card-body');
    const paperTitle     = document.getElementById('paper-title');
    const loading        = document.getElementById('loading');
    const loadingText    = document.getElementById('loading-text');
    const providerLabel  = document.getElementById('provider-label');

    // Restore last-used provider from localStorage
    const savedProvider = localStorage.getItem('ai_provider');
    if (savedProvider) providerSelect.value = savedProvider;

    // Restore API key for current provider from sessionStorage
    function storageKey(p) { return `ai_key_${p}`; }
    apiKeyInput.value = sessionStorage.getItem(storageKey(providerSelect.value)) || '';
    updateHint();

    providerSelect.addEventListener('change', () => {
      localStorage.setItem('ai_provider', providerSelect.value);
      apiKeyInput.value = sessionStorage.getItem(storageKey(providerSelect.value)) || '';
      updateHint();
    });

    function updateHint() {
      providerHint.innerHTML = PROVIDER_HINTS[providerSelect.value] || '';
    }

    function escapeHtml(str) {
      const el = document.createElement('div');
      el.textContent = str;
      return el.innerHTML;
    }

    if (!itemId) {
      btnGenerate.disabled = true;
      summaryCard.classList.add('visible');
      cardBody.innerHTML = `<div class="error-state">⚠ Missing item_id parameter.</div>`;
    }

    btnGenerate.addEventListener('click', () => {
      const provider = providerSelect.value;
      const apiKey   = apiKeyInput.value.trim();

      if (!apiKey) {
        apiKeyInput.focus();
        return;
      }

      // Persist key for this session
      sessionStorage.setItem(storageKey(provider), apiKey);
      localStorage.setItem('ai_provider', provider);

      // Show the summary card in loading state
      summaryCard.classList.add('visible');
      providerLabel.textContent = PROVIDER_LABELS[provider] || provider;
      loadingText.textContent   = `Generating summary with ${PROVIDER_LABELS[provider] || provider}…`;
      btnGenerate.disabled = true;
      btnGenerate.textContent = 'Generating…';

      fetch(`/api/items/${itemId}/summary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider, api_key: apiKey }),
      })
        .then(async (resp) => {
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.detail || `HTTP ${resp.status}`);
          }
          return resp.json();
        })
        .then(({ title, summary }) => {
          document.title = `${title} — AI Tracker`;
          paperTitle.textContent = title;
          cardTop.classList.add('visible');
          cardBody.innerHTML = `<div class="summary-body">${renderMarkdown(summary)}</div>`;
          btnGenerate.disabled = false;
          btnGenerate.textContent = 'Regenerate';
        })
        .catch((err) => {
          cardBody.innerHTML = `<div class="error-state">⚠ ${escapeHtml(err.message)}</div>`;
          btnGenerate.disabled = false;
          btnGenerate.textContent = 'Retry';
        });
    });
  </script>
</body>
</html>
